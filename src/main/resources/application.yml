# HabitSpark - 学习习惯培养积分奖励系统
server:
  port: 8080

spring:
  application:
    name: HabitSpark

  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:data/habitspark.db
    hikari:
      maximum-pool-size: 1
      connection-timeout: 30000

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  # 数据库初始化
  sql:
    init:
      mode: always
      schema-locations: classpath:data/schema.sql
      data-locations: classpath:data/seed.sql

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.habitspark.dao.entity
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    # SQLite WAL 模式
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
habitspark:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-secure-random-string-in-production-2026}
    expiration: 1800000  # 30 分钟 (毫秒)
    refresh-expiration: 604800000  # 7 天 (毫秒)

# 文件上传路径
  upload:
    path: ./uploads/

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 日志
logging:
  level:
    com.habitspark: DEBUG
    org.springframework.security: INFO
